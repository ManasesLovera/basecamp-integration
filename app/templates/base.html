<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Basecamp{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4 shadow-sm">
    <a href="/" class="text-green-600 font-bold text-lg tracking-tight">&#9670; Basecamp</a>
    {% block breadcrumbs %}{% endblock %}
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
