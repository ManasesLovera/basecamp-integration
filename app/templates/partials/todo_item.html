<li id="todo-{{ todo.id }}"
    class="flex items-center gap-3 bg-white border border-gray-200 rounded-lg px-4 py-3 {% if todo.completed %}opacity-50{% endif %}">
  <!-- Complete button -->
  {% if not todo.completed %}
  <button
    hx-post="/projects/{{ project_id }}/todos/{{ todo.id }}/complete?todolist_id={{ todolist_id }}"
    hx-target="#todo-{{ todo.id }}"
    hx-swap="outerHTML"
    title="Mark complete"
    class="w-5 h-5 rounded-full border-2 border-gray-300 hover:border-green-500 flex-shrink-0 transition-colors">
  </button>
  {% else %}
  <span class="w-5 h-5 rounded-full bg-green-500 flex items-center justify-center flex-shrink-0">
    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
    </svg>
  </span>
  {% endif %}

  <!-- Content -->
  <span class="flex-1 text-sm {% if todo.completed %}line-through text-gray-400{% endif %}">
    {{ todo.content }}
  </span>

  <!-- Due date -->
  {% if todo.due_on %}
  <span class="text-xs text-gray-400 ml-auto">{{ todo.due_on }}</span>
  {% endif %}
</li>
